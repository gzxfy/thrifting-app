{% extends "base.html" %}

{% block content %}
<h1>Login Page</h1>


<div class="form-card">
    <form action="/login" method="POST" novalidate>
        <div class="form-group">
            <label>Email</label>
            <input type="email" name="email" value="{{ email or ''}}" placeholder="Enter your email" required>
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" name="password" value="{{ password or ''}}" placeholder="Enter your password" required>
        </div>
        <button type="submit" class="btn btn-primary">Login</button>
        <button type="button" class="btn btn-secondary" onclick="window.location.href='/register'; return false;">Don't have an account?</button>
    </form>
</div>
{% endblock %}
