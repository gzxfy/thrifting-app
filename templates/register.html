{% extends "base.html" %}

{% block content %}
    <h1>Registeration</h1>
    {% if error %}
        <div class="alert alert-danger">
            {{ error }}
        </div>
    {% endif %}
    
<div class="container">
    <div class="form-card">
        <form action="/register" method="POST">
            <div class="form-group">
                <label>Email</label>
                <input type="email" name="email" required>
            </div>

            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" required>
            </div>

            <button type="submit" class="btn btn-primary">Register</button>
            <button type="button" class="btn btn-secondary" onclick="window.location.href='/login'; return false;">Already have an account?</button>
        </form>
    </div>
</div>
{% endblock %}
