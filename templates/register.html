{% extends "base.html" %}

{% block content %}
<h1>Registeration</h1>

<div class="container">
    <div class="form-card">
        <form action="/register" method="POST" novalidate>
            <div class="form-group">
                <label>Email</label>
                <input type="email" name="email" value="{{ email or ''}}" placeholder="Enter your email" required>
            </div>

            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" value="{{ password or ''}}" placeholder="Enter your password" required>
            </div>

            <div class="form-group">
                <label>Confirm Password</label>
                <input type="password" name="confirm_password" placeholder="Confirm your password" required>
            </div>

            {#-- Add required attribute to confirm password field --#}

            <button type="submit" class="btn btn-primary">Register</button>
            <button type="button" class="btn btn-secondary" onclick="window.location.href='/login'; return false;">Already have an account?</button>
        </form>
    </div>
</div>

<div class ="registeration-wrapper">
    </div class="validation-sidebar">
        <label class="req-uppercase"> Password must contain at least one uppercase letter</label>
        <label class="req-lowercase"> Password must contain at least one lowercase letter</label>
        <label class="req-digit"> Password must contain at least one digit</label>
        <label class="req-length"> Password must be at least 8 characters long</label>
        <label class="req-match"> Password and confirm password must match</label>
    </div>
</div>
{% endblock %}
